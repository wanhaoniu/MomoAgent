app_name: smart-mirror-gesture-tracking

source:
  type: camera
  camera_index: 0
  capture_uri: null
  width: 1280
  height: 720
  fps: 30.0
  rotation_deg: 0
  api_preference: auto

recognizer:
  model_path: ${GESTURE_MODEL_PATH:../weights/gesture_recognizer.task}
  model_url: ${GESTURE_MODEL_URL:https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task}
  allow_auto_download: true
  num_hands: 1
  min_hand_detection_confidence: 0.5
  min_hand_presence_confidence: 0.5
  min_tracking_confidence: 0.5
  score_threshold: 0.55
  stability_frames: 4
  missing_reset_frames: 4

visualizer:
  enabled: false
  window_name: MediaPipe Gesture Tracking
  draw_landmarks: true

service:
  host: 0.0.0.0
  port: 8012

logging:
  level: INFO
  log_dir: ./logs
  file_name: gesture_tracking.log
