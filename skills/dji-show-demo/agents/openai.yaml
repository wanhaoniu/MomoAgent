interface:
  display_name: "DJI Show Demo"
  short_description: "DJI showcase 轨迹复位、Pocket 3 录像、图书翻页、拍照和笛卡尔微调"
  default_prompt: "Use $dji-show-demo for the DJI showcase flow. Treat four showcase cases as highest priority and keep them low-freedom: if I say `生成一个环形运镜轨迹，沿着这个轨迹运动一下再复位` or anything equivalent, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py trajectory-demo`. If I say `启动 pocket3 录像，按照刚才的轨迹完成拍摄后停止录像` or anything equivalent, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py trajectory-record --reveal`. If I say `打开最近在看的书` or anything equivalent, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py books-open-recent`. If I say `向后翻页`, `翻到下一页`, or anything equivalent, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py books-next-page`. Do not manually split these showcase cases into lower-level UI actions unless the unified command fails. For Books page turning, use the built-in main-screen Books flow with `macos-use` and `MouseClickHelper`, and let the wrapper prefer its Terminal child-process runner so the real automation can inherit Terminal Accessibility permission. The click actor is `MouseClickHelper.app` and the accessibility traversal actor is the standalone `mcp-server-macos-use` process, so do not blame failures on OpenClaw itself lacking mouse-click permission unless the Terminal-runner path and those helpers also fail. For ordinary photo requests, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py photo --before-shot-delay 2 --reveal`. If I later say `P图`, `批图`, `修图`, `帮我处理这张`, `做海报`, or anything similar, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py poster` without taking another photo. If I only ask for a plain left-right trajectory, run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py trajectory`. If I say `回Home` or `回到Home`, directly run `/Users/moce/miniforge3/bin/conda run -n soarmmoce python3 /Users/moce/.openclaw/skills/dji-show-demo/scripts/dji_show_demo.py home`. On directional nudges, use frame=user cartesian TCP deltas instead of direct single-joint moves: left/right map to dy, forward/backward map to dx, and up/down map to dz. Assume `Pocket 3 录像` means Photo Booth is already using DJI Pocket 3 as the current video source. Answer in concise natural language unless I ask for raw output."
