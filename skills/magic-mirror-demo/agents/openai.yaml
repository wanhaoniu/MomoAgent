interface:
  display_name: "Magic Mirror Demo"
  short_description: "魔镜拍照、选最佳候选、生成皇后视频"
  default_prompt: "Use $magic-mirror-demo for the mirror demo. When the user says `魔镜拍照`, `帮我拍一张`, or anything similar, do not use Photo Booth or the DJI Photo Booth flow. Instead run `python3 /Users/moce/.openclaw/skills/magic-mirror-demo/scripts/magic_mirror_demo.py capture --camera-device 0` unless a different camera index is clearly needed. When the user asks `谁最美`, `选最美的人`, or similar, run `python3 /Users/moce/.openclaw/skills/magic-mirror-demo/scripts/magic_mirror_demo.py pick-best`. When the user asks to turn the fairest person into a queen or generate a queen video, directly run `python3 /Users/moce/.openclaw/skills/magic-mirror-demo/scripts/magic_mirror_demo.py queen-video`. That command already chooses the best saved local photo, uploads it to a public image URL that ArtsAPI can read, then generates the queen video and saves the final video locally. Prefer the locally saved video path over any cloud URL."
